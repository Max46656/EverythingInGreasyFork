name: Feature Request / 功能建議
description: 提出新的功能建議或改進想法 / Suggest a new feature or improvement
title: "[Feature Request]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## 感謝您的建議！ / Thank you for your suggestion!

        請詳細描述您希望新增的功能或改進，讓我們了解您的使用情境與需求。  
        越清楚的描述，越容易評估並實作。  
        Please describe the feature or improvement you would like, including your use case and needs.  
        The clearer the description, the easier it is to evaluate and implement.

  - type: input
    id: script-name
    attributes:
      label: 相關腳本名稱 / Related Script Name
      description: 這個建議適用於哪一個腳本？（若有多個請註明） / Which script does this suggestion apply to? (list multiple if needed)
      placeholder: 腳本名稱
    validations:
      required: true

  - type: textarea
    id: problem-or-use-case
    attributes:
      label: 目前遇到的問題或使用情境 / Current Problem or Use Case
      description: 這個功能建議是為了解決什麼問題？或是在什麼情境下會特別有用？ / What problem are you trying to solve, or in what situation would this be useful?
      placeholder: |
        目前...
        我經常需要...

        Currently...
        I often need to...
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: 建議的功能或解決方案 / Proposed Feature or Solution
      description: 您希望新增什麼功能？請盡量詳細描述理想的行為 / What feature would you like to see added? Describe the ideal behavior in detail.
      placeholder: |
        希望能新增...
        理想情況下應該...

        I would like to add...
        Ideally it should...
    validations:
      required: true

  - type: textarea
    id: benefits
    attributes:
      label: 預期好處 / Expected Benefits
      description: 這個功能對您或其他使用者有哪些幫助？ / How would this feature benefit you or other users?
      placeholder: |
        • ...
        • ...

        • ...
        • ...
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 目前替代方案 / Current Alternatives or Workarounds
      description: 您目前是如何處理這個需求的？有使用其他工具或腳本嗎？ / How are you currently handling this need? Are you using any other tools or scripts?
      placeholder: |
        目前我使用... / 手動...

        Currently I use... / Manually...
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: 其他補充資訊 / Additional Context
      description: 任何相關的截圖、參考連結、類似網站的實作方式、或您認為有幫助的細節 / Any screenshots, reference links, examples from other sites, or additional details that might help
      placeholder: |
        參考網站：...
        截圖：（可拖曳上傳）

        Reference site: ...
        Screenshot: (drag & drop)
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 確認事項 / Checklist
      options:
        - label: 我確認這個建議尚未在現有功能中實現 / I have confirmed this feature is not already implemented
        - label: 我願意提供更多細節或測試新功能（如果需要的話） / I am willing to provide more details or help test the new feature if needed
